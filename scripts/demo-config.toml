# Curated purr config for the README demo screenshot (scripts/gen-svg.sh).
#
# This is purr's stock neofetch preset (`purr generate --neofetch`) with the
# Shell, Terminal, and Terminal Font probes removed. Those fields are derived by
# walking the parent-process tree, but the screenshot is rendered through
# `mise run svg` (mise -> bash -> purr), so they would always report "bash" /
# "mise" instead of a real shell/terminal. Everything else is the default.
[Neofetch]
title = true
underline = true
col = true
separator = ":"
bold = true
underline_char = "-"
title_fqdn = false
colors = []
backend = "ascii"
image_cols = 40

[Neofetch.color_blocks]
range = [0, 15]
width = 3
height = 1

[Neofetch.ascii]
colors = []
bold = true

[[Neofetch.probes]]
[Neofetch.probes.OS]
label = "OS"
shorthand = "off"
os_arch = true

[[Neofetch.probes]]
[Neofetch.probes.Model]
label = "Host"

[[Neofetch.probes]]
[Neofetch.probes.Kernel]
label = "Kernel"
shorthand = true

[[Neofetch.probes]]
[Neofetch.probes.Uptime]
label = "Uptime"
format = "on"

[[Neofetch.probes]]
[Neofetch.probes.Packages]
label = "Packages"
display = "on"

[[Neofetch.probes]]
[Neofetch.probes.Resolution]
label = "Resolution"
refresh_rate = false

[[Neofetch.probes]]
[Neofetch.probes.DE]
label = "DE"
version = true

[[Neofetch.probes]]
[Neofetch.probes.WM]
label = "WM"

[[Neofetch.probes]]
[Neofetch.probes.WMTheme]
label = "WM Theme"

[[Neofetch.probes]]
[Neofetch.probes.Theme]
label = "Theme"

[[Neofetch.probes]]
[Neofetch.probes.Icons]
label = "Icons"

[[Neofetch.probes]]
[Neofetch.probes.CPU]
label = "CPU"
brand = true
cores = "logical"
speed = true
speed_type = "bios_limit"
speed_shorthand = false

[[Neofetch.probes]]
[Neofetch.probes.GPU]
label = "GPU"
brand = true
gpu_type = "all"

[[Neofetch.probes]]
[Neofetch.probes.Memory]
label = "Memory"
unit = "mib"
percent = false
