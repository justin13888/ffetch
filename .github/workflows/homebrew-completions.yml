# Wires shell completions and the man page into the Homebrew formula.
#
# cargo-dist bundles `purr.1` + `completions/` into every release archive (see
# `[workspace.metadata.dist] include`), but the formula it generates installs only
# the binary and dumps the rest into `pkgshare` as leftover files — so `brew install`
# ships no working completions and no `man purr`. cargo-dist 0.32.0 has no config to
# customize the formula's `install` body, so we patch the pushed formula here.
#
# This chains off the Release workflow *completing*: cargo-dist's Homebrew publish
# job runs inside `release.yml`, which must finish before this `workflow_run` fires,
# so the tap already holds the new formula (no race). Until HOMEBREW_TAP_TOKEN is set
# the job skips itself, so releases never fail because of this step.
name: Add Homebrew completions

on:
  # cargo-dist creates the GitHub Release with the default GITHUB_TOKEN, which does
  # NOT trigger `on: release`. So we chain off the Release workflow completing instead
  # (a tag push runs Release; its head_branch is the tag). workflow_dispatch stays as a
  # manual re-run path (it patches whatever formula is currently in the tap).
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  homebrew-completions:
    name: Install completions + man page into the formula
    runs-on: ubuntu-latest
    # Owner-only; and when chained, only for a successful Release triggered by a tag
    # push (skip the pull_request dry-runs of Release).
    if: >-
      github.repository_owner == 'justin13888' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'))
    steps:
      - name: Check tap token
        id: guard
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping Homebrew completions." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out the tap
        if: ${{ steps.guard.outputs.skip != 'true' }}
        uses: actions/checkout@v4
        with:
          repository: justin13888/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Patch the formula and push
        if: ${{ steps.guard.outputs.skip != 'true' }}
        run: |
          # Insert the completion + man installation into the generated formula.
          # Idempotent (skips if already present) and fails loudly if cargo-dist's
          # template changes so a version bump can't silently regress completions.
          # Paths match the archive layout: the man page is flattened to `purr.1`
          # at the archive root; completions live under `completions/`.
          python3 - <<'PY'
          import sys

          path = "Formula/purr.rb"
          with open(path, encoding="utf-8") as f:
              src = f.read()

          if "bash_completion.install" in src:
              print("formula already installs completions; nothing to do")
              sys.exit(0)

          anchor = "install_binary_aliases!"
          out, inserted = [], False
          for line in src.splitlines(keepends=True):
              out.append(line)
              if not inserted and line.strip() == anchor:
                  indent = line[: len(line) - len(line.lstrip())]
                  block = [
                      "",
                      f"{indent}# purrfetch: cargo-dist bundles the man page + completions in the",
                      f"{indent}# archive but installs only the binary; wire them into Homebrew here.",
                      f'{indent}man1.install "purr.1"',
                      f'{indent}bash_completion.install "completions/purr.bash" => "purr"',
                      f'{indent}zsh_completion.install "completions/_purr"',
                      f'{indent}fish_completion.install "completions/purr.fish"',
                  ]
                  out.append("\n".join(block) + "\n")
                  inserted = True

          if not inserted:
              print(
                  "::error::'install_binary_aliases!' call not found in Formula/purr.rb; "
                  "the cargo-dist formula template may have changed",
                  file=sys.stderr,
              )
              sys.exit(1)

          with open(path, "w", encoding="utf-8") as f:
              f.write("".join(out))
          print("patched formula with completion + man installation")
          PY

          if [ -z "$(git status --porcelain)" ]; then
            echo "formula already up to date; nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/purr.rb
          git commit -m "purr: install shell completions and man page"
          git push
