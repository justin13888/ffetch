# Publishes purr-bin and purr-git to the AUR on each stable release.
#
# One-time manual setup (see packaging/README.md):
#   - create an AUR account and add your SSH public key
#   - create the empty AUR packages `purr-bin` and `purr-git` (first push)
#   - store the matching SSH PRIVATE key as the AUR_SSH_PRIVATE_KEY secret
# Until AUR_SSH_PRIVATE_KEY is set, the job skips itself.
name: Deploy to AUR

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag to publish (e.g. v1.0.0)"
        required: true

jobs:
  aur:
    name: Publish ${{ matrix.pkg }}
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'justin13888' }}
    strategy:
      fail-fast: false
      matrix:
        pkg: [purr-bin, purr-git]
    env:
      TAG: ${{ github.event.inputs.release-tag || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for AUR_SSH_PRIVATE_KEY
        id: guard
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$AUR_SSH_PRIVATE_KEY" ]; then
            echo "AUR_SSH_PRIVATE_KEY is not set; skipping AUR deploy." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pin purr-bin to the released version
        if: ${{ steps.guard.outputs.skip != 'true' && matrix.pkg == 'purr-bin' }}
        run: |
          ver="${TAG#v}"
          sed -i "s/^pkgver=.*/pkgver=${ver}/" packaging/aur/purr-bin/PKGBUILD

      - name: Deploy ${{ matrix.pkg }} to the AUR
        if: ${{ steps.guard.outputs.skip != 'true' }}
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ${{ matrix.pkg }}
          pkgbuild: packaging/aur/${{ matrix.pkg }}/PKGBUILD
          commit_username: justin13888
          commit_email: 20733699+justin13888@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ env.TAG }}"
          # purr-bin pins concrete tarball checksums; purr-git uses SKIP (VCS source).
          updpkgsums: ${{ matrix.pkg == 'purr-bin' }}
