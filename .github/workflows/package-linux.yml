# Builds Debian (.deb) and RPM (.rpm) packages from the released binary and
# attaches them to the GitHub Release, so users can `dpkg -i` / `dnf install`
# a downloaded file without a repo.
#
# This is a SEPARATE workflow (triggered after the release is published) so it
# never has to touch cargo-dist's auto-generated release.yml. The .deb/.rpm
# contents come from [package.metadata.deb] and [package.metadata.generate-rpm]
# in Cargo.toml.
name: Linux packages

on:
  # cargo-dist creates the GitHub Release with the default GITHUB_TOKEN, which does
  # NOT trigger `on: release`. So we chain off the Release workflow completing instead
  # (a tag push runs Release; its head_branch is the tag). workflow_dispatch stays as a
  # manual re-run path.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag to attach packages to (e.g. v1.0.0)"
        required: true

permissions:
  contents: write # upload assets to the release

jobs:
  linux-packages:
    name: Build and attach .deb / .rpm
    runs-on: ubuntu-latest
    # Owner-only; and when chained, only for a successful Release triggered by a tag
    # push (skip the pull_request dry-runs of Release).
    if: >-
      github.repository_owner == 'justin13888' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'))
    env:
      TAG: ${{ github.event.inputs.release-tag || github.event.workflow_run.head_branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb and cargo-generate-rpm
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Build .deb
        run: cargo deb --no-build

      - name: Build .rpm
        run: |
          # cargo-generate-rpm does not strip; do it here to keep the rpm lean.
          strip target/release/purr
          cargo generate-rpm

      - name: Attach packages to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" \
            target/debian/*.deb \
            target/generate-rpm/*.rpm \
            --clobber
