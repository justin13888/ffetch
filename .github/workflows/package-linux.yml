# Builds Debian (.deb) and RPM (.rpm) packages from the released binary and
# attaches them to the GitHub Release, so users can `dpkg -i` / `dnf install`
# a downloaded file without a repo.
#
# This is a SEPARATE workflow (triggered after the release is published) so it
# never has to touch cargo-dist's auto-generated release.yml. The .deb/.rpm
# contents come from [package.metadata.deb] and [package.metadata.generate-rpm]
# in Cargo.toml.
name: Linux packages

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release tag to attach packages to (e.g. v1.0.0)"
        required: true

permissions:
  contents: write # upload assets to the release

jobs:
  linux-packages:
    name: Build and attach .deb / .rpm
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'justin13888' }}
    env:
      TAG: ${{ github.event.inputs.release-tag || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb and cargo-generate-rpm
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Build .deb
        run: cargo deb --no-build

      - name: Build .rpm
        run: |
          # cargo-generate-rpm does not strip; do it here to keep the rpm lean.
          strip target/release/purr
          cargo generate-rpm

      - name: Attach packages to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG" \
            target/debian/*.deb \
            target/generate-rpm/*.rpm \
            --clobber
