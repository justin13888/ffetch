name: Release-plz

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [master]

jobs:
  # Opens/updates the "release" PR that bumps the version and updates CHANGELOG.md.
  #
  # Runs on the default GITHUB_TOKEN — no PAT and no crates.io token. This relies on
  # the repo setting "Allow GitHub Actions to create and approve pull requests" being
  # enabled. The git tag and the crates.io publish are NOT done here; the owner cuts
  # the release manually after merging this PR (see packaging/README.md):
  #   git tag vX.Y.Z && git push origin vX.Y.Z   # human push triggers cargo-dist
  #   cargo publish                              # crates.io (until Trusted Publishing)
  #
  # Trusted Publishing: a tokenless, tag-triggered crates.io publish job already
  # exists at .github/workflows/crates-io-publish.yml. It is gated OFF until the
  # owner configures the Trusted Publisher on crates.io and sets the repository
  # variable CRATES_IO_TRUSTED_PUBLISHING=true; once enabled it replaces the manual
  # local `cargo publish`. See https://crates.io/docs/trusted-publishing.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
