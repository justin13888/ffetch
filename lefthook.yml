pre-commit:
  piped: true
  commands:
    format-fix:
      priority: 1
      run: just format-fix
    lint-fix:
      priority: 2
      run: just lint-fix
    check-modified:
      priority: 3
      run: 'git diff --exit-code --quiet || (echo "Files were modified by cargo fmt or cargo clippy --fix. Please review and re-stage the changes." && exit 1)'

pre-push:
  commands:
    format:
      run: just format
    lint:
      run: just lint
    test:
      run: cargo test
