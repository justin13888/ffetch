pre-commit:
  piped: true
  commands:
    fmt:
      priority: 1
      run: just fmt
    lint:
      priority: 2
      run: just lint
    check-modified:
      priority: 3
      run: 'git diff --exit-code --quiet || (echo "Files were modified by cargo fmt or cargo clippy --fix. Please review and re-stage the changes." && exit 1)'

pre-push:
  commands:
    fmt-check:
      run: just fmt-check
    lint-check:
      run: just lint-check
    test:
      run: just test
