[workspace]
# release-plz owns version bumping, CHANGELOG.md, and the release PR. In CI it runs
# `command: release-pr` only, on the default GITHUB_TOKEN (no PAT, no crates.io token).
# The git tag and crates.io publish are done MANUALLY at release-cut time: the owner
# pushes `v{version}` locally (which triggers cargo-dist) and runs `cargo publish`
# (see packaging/README.md). The git_tag_* settings below apply only if you instead run
# `release-plz release` locally.
# cargo-dist owns the GitHub Release + binaries + Homebrew, so disable release-plz's GitHub release.
changelog_update   = true
git_tag_enable     = true
git_release_enable = false
git_tag_name       = "v{{ version }}"  # single-package tag; must match cargo-dist's release.yml trigger
semver_check       = false             # purr is primarily a binary; skip cargo-semver-checks noise
pr_labels          = ["release"]
